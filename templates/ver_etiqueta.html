<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Etiqueta {{ id }}</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;

            /* 🔥 CENTRADO EN PANTALLA */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .etiqueta-container {
            width: 60mm;
            height: 24mm;
        }
        

        img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 🔥 evita cortes */
            display: block;
        }

        button,
        .download-btn {
            background: black;
            color: white;
            padding: 10px 20px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            display: inline-block;
            text-decoration: none;
        }

        /* 🔥 IMPRESIÓN PERFECTA */
        @media print {

            @page {
                margin: 0;
                size: auto; /* 🔥 evita problemas de escala */
            }

            html, body {
                width: 60mm;
                height: 24mm;
            }

            body {
                margin: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            button,
            .download-btn {
                display: none;
            }

            .etiqueta-container {
                width: 30mm;
                height: 24mm;
                margin: 0;
                padding: 0;
            }
        }
    </style>
</head>

<body>

    <div>
        <button onclick="window.print()">🖨 Imprimir</button>
        <a href="{{ etiqueta_url }}" download="etiqueta_{{ id }}.png" class="download-btn">⬇ Descargar</a>
    </div>

    <div class="etiqueta-container">
        <img src="{{ etiqueta_url }}" alt="Etiqueta ID {{ id }}">
    </div>

</body>
</html>
