<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Etiqueta {{ id }}</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
        }

        .etiqueta-container {
            width: 30mm;
            height: 24mm;
        }

        img {
            width: 30mm;
            height: 24mm;
            display: block;
        }

        button,
        .download-btn {
            background: black;
            color: white;
            padding: 10px 20px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            display: inline-block;
            text-decoration: none;
        }

        /* 🔥 CONFIG IMPRESIÓN PRO */
        @media print {

            @page {
                size: 30mm 24mm;
                margin: 0;
            }

            body {
                margin: 0;
            }

            button,
            .download-btn {
                display: none;
            }

            .etiqueta-container {
                width: 30mm;
                height: 24mm;
                margin: 0;
                padding: 0;
                page-break-after: avoid;
            }
        }
    </style>
</head>

<body>

    <button onclick="window.print()">🖨 Imprimir</button>
    <a href="{{ etiqueta_url }}" download="etiqueta_{{ id }}.png" class="download-btn">⬇ Descargar</a>

    <div class="etiqueta-container">
        <img src="{{ etiqueta_url }}" alt="Etiqueta ID {{ id }}">
    </div>

</body>
</html>
